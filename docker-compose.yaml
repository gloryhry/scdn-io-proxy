services:
  scdn-io-proxy:
    # 你也可以改成本地构建：build: .
    image: ghcr.io/gloryhry/scdn-io-proxy:latest
    container_name: scdn-io-proxy
    restart: unless-stopped
    ports:
      # 代理服务端口（HTTP Proxy + SOCKS5 同端口）
      - "${PROXY_PORT:-1080}:1080"
      # 管理后台端口（避免使用 6000，Chromium 会拦截）
      - "${ADMIN_PORT:-8080}:8080"
    volumes:
      # 注意：请确保宿主机 ./data 目录可写（以及其中的 proxy-pool.sqlite 可写）。
      # 若你之前用 root 跑过导致 ./data 归属为 root，可执行一次 chown 修复（会保留数据）：
      #   sudo chown -R 1000:1000 ./data
      - "./data:/data"
    command:
      - "--listen"
      - "0.0.0.0:1080"
      - "--admin"
      - "0.0.0.0:8080"
      - "--db"
      - "/data/proxy-pool.sqlite"
      - "--scdn-api-key"
      - "${SCDN_API_KEY:-}"
      - "--fetch-protocol"
      - "${FETCH_PROTOCOL:-http}"
      - "--country"
      - "${COUNTRY_CODE:-all}"
      - "--test-url"
      - "${TEST_URL:-https://www.example.com/}"
      - "--proxy-user"
      - "${PROXY_USER:-proxy}"
      - "--proxy-pass"
      - "${PROXY_PASS:-proxy}"
